<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plantas</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Plantas">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0b0f14">
<style>
  :root{
    --bg-0:#0b0f14;
    --bg-1:#10161d;
    --bg-2:#161d26;
    --card:#141b23;
    --card-hover:#1b2430;
    --border:rgba(255,255,255,0.08);
    --border-strong:rgba(255,255,255,0.16);
    --text-0:#eef2f6;
    --text-1:#aab4c0;
    --text-2:#6f7b88;
    --accent:#ff8a3d;
    --accent-2:#ffb347;
    --accent-soft:rgba(255,138,61,0.14);
    --blue:#4dabf7;
    --green:#51cf66;
    --purple:#b197fc;
    --radius-lg:22px;
    --radius-md:16px;
    --radius-sm:10px;
    --shadow:0 20px 50px -20px rgba(0,0,0,0.6);
    --ease:cubic-bezier(.22,1,.36,1);
  }

  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:"Inter","Segoe UI",system-ui,-apple-system,sans-serif;
    background:
      radial-gradient(1200px 600px at 15% -10%, rgba(255,138,61,0.10), transparent 60%),
      radial-gradient(900px 500px at 110% 10%, rgba(77,171,247,0.10), transparent 55%),
      var(--bg-0);
    color:var(--text-0);
    min-height:100%;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }

  .app{
    max-width:1180px;
    margin:0 auto;
    padding:40px 24px 80px;
    position:relative;
  }

  /* ---------- HEADER ---------- */
  header.top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    margin-bottom:38px;
    flex-wrap:wrap;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:14px;
  }
  .brand-mark{
    width:46px;height:46px;
    border-radius:14px;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 10px 30px -8px rgba(255,138,61,0.55);
    flex-shrink:0;
  }
  .brand-mark svg{width:24px;height:24px;}
  .brand h1{
    font-size:19px;
    font-weight:700;
    margin:0;
    letter-spacing:-0.01em;
  }
  .brand span{
    display:block;
    font-size:12.5px;
    color:var(--text-2);
    font-weight:500;
    margin-top:2px;
  }

  .breadcrumb{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:13.5px;
    color:var(--text-1);
    flex-wrap:wrap;
  }
  .breadcrumb .crumb{
    display:flex;align-items:center;gap:8px;
    cursor:pointer;
    padding:6px 12px;
    border-radius:999px;
    transition:background .25s var(--ease), color .25s var(--ease);
  }
  .breadcrumb .crumb.clickable:hover{ background:var(--accent-soft); color:var(--accent-2); }
  .breadcrumb .crumb.current{ color:var(--text-0); font-weight:600; }
  .breadcrumb .sep{ color:var(--text-2); opacity:.6; }

  /* ---------- SEARCH ---------- */
  .search-wrap{
    position:relative;
    margin-bottom:26px;
    opacity:0;
    transform:translateY(8px);
    animation:fadeUp .5s var(--ease) forwards;
    animation-delay:.05s;
  }
  .search-wrap input{
    width:100%;
    padding:15px 18px 15px 46px;
    border-radius:var(--radius-md);
    border:1px solid var(--border);
    background:var(--bg-2);
    color:var(--text-0);
    font-size:14.5px;
    outline:none;
    transition:border-color .25s var(--ease), background .25s var(--ease), box-shadow .25s var(--ease);
  }
  .search-wrap input:focus{
    border-color:var(--accent);
    box-shadow:0 0 0 4px var(--accent-soft);
  }
  .search-wrap svg{
    position:absolute; left:16px; top:50%; transform:translateY(-50%);
    width:18px;height:18px; color:var(--text-2);
    pointer-events:none;
  }

  /* ---------- VIEWS / TRANSITIONS ---------- */
  .view{
    position:relative;
  }
  .view-exit{
    animation:viewOut .32s var(--ease) forwards;
  }
  .view-enter{
    animation:viewIn .45s var(--ease) forwards;
  }
  @keyframes viewOut{
    to{ opacity:0; transform:translateY(-10px) scale(.985); }
  }
  @keyframes viewIn{
    from{ opacity:0; transform:translateY(14px) scale(.98); }
    to{ opacity:1; transform:translateY(0) scale(1); }
  }
  @keyframes fadeUp{
    to{ opacity:1; transform:translateY(0); }
  }

  /* ---------- ZONE GRID ---------- */
  .zone-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(230px,1fr));
    gap:20px;
  }
  .zone-card{
    position:relative;
    border-radius:var(--radius-lg);
    padding:30px 26px;
    background:linear-gradient(160deg, var(--card), var(--bg-1));
    border:1px solid var(--border);
    cursor:pointer;
    overflow:hidden;
    isolation:isolate;
    transition:transform .4s var(--ease), border-color .4s var(--ease), box-shadow .4s var(--ease);
    opacity:0;
    transform:translateY(16px);
    animation:fadeUp .55s var(--ease) forwards;
  }
  .zone-card:nth-child(1){animation-delay:.05s;}
  .zone-card:nth-child(2){animation-delay:.12s;}
  .zone-card:nth-child(3){animation-delay:.19s;}
  .zone-card:nth-child(4){animation-delay:.26s;}

  .zone-card::before{
    content:"";
    position:absolute; inset:0;
    background:radial-gradient(220px 220px at 85% -10%, var(--zone-glow, rgba(255,138,61,.25)), transparent 65%);
    opacity:.7;
    z-index:-1;
    transition:opacity .4s var(--ease);
  }
  .zone-card:hover{
    transform:translateY(-6px);
    border-color:var(--border-strong);
    box-shadow:var(--shadow);
  }
  .zone-card:hover::before{ opacity:1; }
  .zone-card:active{ transform:translateY(-2px) scale(.99); }

  .zone-icon{
    width:52px;height:52px;
    border-radius:14px;
    display:flex;align-items:center;justify-content:center;
    margin-bottom:22px;
    background:var(--zone-bg, var(--accent-soft));
    color:var(--zone-color, var(--accent));
    transition:transform .4s var(--ease);
  }
  .zone-card:hover .zone-icon{ transform:scale(1.08) rotate(-4deg); }
  .zone-icon svg{width:26px;height:26px;}

  .zone-card h2{
    font-size:22px;
    margin:0 0 6px;
    font-weight:700;
    letter-spacing:-0.01em;
  }
  .zone-card p{
    margin:0;
    font-size:13.5px;
    color:var(--text-1);
  }
  .zone-count{
    display:inline-flex;
    align-items:center;
    gap:6px;
    margin-top:18px;
    font-size:12.5px;
    color:var(--text-2);
    font-weight:600;
    letter-spacing:.02em;
  }
  .zone-count .dot{
    width:6px;height:6px;border-radius:50%;
    background:var(--zone-color, var(--accent));
  }
  .zone-arrow{
    position:absolute;
    right:24px; bottom:24px;
    width:34px;height:34px;
    border-radius:50%;
    border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center;
    color:var(--text-2);
    transition:transform .4s var(--ease), color .4s var(--ease), border-color .4s var(--ease), background .4s var(--ease);
  }
  .zone-card:hover .zone-arrow{
    transform:translate(3px,-3px);
    color:var(--bg-0);
    background:var(--zone-color, var(--accent));
    border-color:transparent;
  }
  .zone-arrow svg{width:15px;height:15px;}

  /* ---------- EQUIPMENT LIST ---------- */
  .list-header{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:18px;
    gap:12px;
    flex-wrap:wrap;
  }
  .list-header h2{
    font-size:26px;
    margin:0;
    font-weight:700;
    letter-spacing:-0.01em;
    display:flex; align-items:center; gap:12px;
  }
  .list-header .badge{
    font-size:12px;
    font-weight:700;
    padding:4px 11px;
    border-radius:999px;
    background:var(--accent-soft);
    color:var(--accent-2);
  }
  .list-header .sub{
    font-size:13px;
    color:var(--text-2);
  }

  .equip-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(220px,1fr));
    gap:14px;
  }
  .equip-card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius-md);
    padding:18px 18px 16px;
    cursor:pointer;
    transition:transform .3s var(--ease), border-color .3s var(--ease), background .3s var(--ease), box-shadow .3s var(--ease);
    opacity:0;
    transform:translateY(10px);
    animation:fadeUp .4s var(--ease) forwards;
    position:relative;
    overflow:hidden;
  }
  .equip-card.general{
    border-color:rgba(255,179,71,0.35);
    background:linear-gradient(160deg, rgba(255,138,61,0.09), var(--card));
  }
  .equip-card:hover{
    transform:translateY(-4px);
    border-color:var(--border-strong);
    background:var(--card-hover);
    box-shadow:0 16px 34px -18px rgba(0,0,0,.7);
  }
  .equip-card .tag{
    display:inline-block;
    font-size:10.5px;
    font-weight:700;
    letter-spacing:.06em;
    text-transform:uppercase;
    color:var(--accent-2);
    margin-bottom:8px;
  }
  .equip-card h3{
    margin:0 0 8px;
    font-size:16.5px;
    font-weight:700;
    letter-spacing:-0.01em;
  }
  .equip-card .preview{
    margin:0;
    font-size:12.5px;
    color:var(--text-2);
    line-height:1.5;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .equip-card .go{
    margin-top:12px;
    display:flex;align-items:center;gap:6px;
    font-size:12px;font-weight:600;
    color:var(--text-2);
    transition:color .3s var(--ease), gap .3s var(--ease);
  }
  .equip-card:hover .go{ color:var(--accent-2); gap:9px; }
  .equip-card .go svg{width:13px;height:13px;}

  .empty-state{
    text-align:center;
    padding:70px 20px;
    color:var(--text-2);
    border:1px dashed var(--border);
    border-radius:var(--radius-lg);
  }
  .empty-state svg{width:40px;height:40px; margin-bottom:14px; opacity:.5;}
  .empty-state h3{ color:var(--text-1); margin:0 0 6px; font-size:16px; }
  .empty-state p{ margin:0; font-size:13.5px; max-width:360px; margin:0 auto; }

  /* ---------- BACK BUTTON ---------- */
  .back-btn{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:var(--bg-2);
    border:1px solid var(--border);
    color:var(--text-1);
    padding:9px 16px 9px 12px;
    border-radius:999px;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    margin-bottom:22px;
    transition:background .25s var(--ease), color .25s var(--ease), border-color .25s var(--ease), transform .25s var(--ease);
  }
  .back-btn:hover{
    background:var(--accent-soft);
    color:var(--accent-2);
    border-color:rgba(255,138,61,0.3);
    transform:translateX(-2px);
  }
  .back-btn svg{width:14px;height:14px;}

  /* ---------- DETAIL PANEL (slide-over) ---------- */
  .scrim{
    position:fixed; inset:0;
    background:rgba(4,6,9,0.6);
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
    opacity:0;
    pointer-events:none;
    transition:opacity .35s var(--ease);
    z-index:40;
  }
  .scrim.open{ opacity:1; pointer-events:auto; }

  .detail-panel{
    position:fixed;
    top:0; right:0; bottom:0;
    width:min(560px, 100%);
    background:linear-gradient(175deg, var(--bg-1), var(--bg-0));
    border-left:1px solid var(--border);
    z-index:41;
    transform:translateX(100%);
    transition:transform .45s var(--ease);
    display:flex;
    flex-direction:column;
    box-shadow:-30px 0 60px -20px rgba(0,0,0,.5);
  }
  .detail-panel.open{ transform:translateX(0); }

  .detail-head{
    padding:26px 28px 20px;
    border-bottom:1px solid var(--border);
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:16px;
    flex-shrink:0;
  }
  .detail-head .zone-pill{
    display:inline-flex; align-items:center; gap:6px;
    font-size:11px; font-weight:700; letter-spacing:.05em; text-transform:uppercase;
    color:var(--zone-color, var(--accent));
    background:var(--zone-bg, var(--accent-soft));
    padding:5px 11px; border-radius:999px;
    margin-bottom:12px;
  }
  .detail-head h2{
    margin:0;
    font-size:24px;
    font-weight:800;
    letter-spacing:-0.01em;
  }
  .close-btn{
    width:38px;height:38px;
    border-radius:50%;
    border:1px solid var(--border);
    background:var(--bg-2);
    color:var(--text-1);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    flex-shrink:0;
    transition:background .25s var(--ease), color .25s var(--ease), transform .25s var(--ease), border-color .25s var(--ease);
  }
  .close-btn:hover{
    background:rgba(255,90,90,0.12);
    color:#ff6b6b;
    border-color:rgba(255,90,90,0.3);
    transform:rotate(90deg);
  }
  .close-btn svg{width:16px;height:16px;}

  .detail-body{
    padding:26px 28px 40px;
    overflow-y:auto;
    flex:1;
  }
  .detail-body .label{
    font-size:11.5px;
    font-weight:700;
    letter-spacing:.06em;
    text-transform:uppercase;
    color:var(--text-2);
    margin:0 0 14px;
    display:flex; align-items:center; gap:8px;
  }
  .detail-body .label svg{width:14px;height:14px;}

  .instructions{
    font-size:15.5px;
    line-height:1.85;
    color:#dbe2e9;
    white-space:pre-wrap;
    word-wrap:break-word;
  }
  .instructions .line{
    padding:14px 16px;
    margin-bottom:10px;
    background:var(--bg-2);
    border:1px solid var(--border);
    border-left:3px solid var(--accent);
    border-radius:10px;
    opacity:0;
    transform:translateX(10px);
    animation:lineIn .4s var(--ease) forwards;
  }
  @keyframes lineIn{ to{ opacity:1; transform:translateX(0);} }

  .instructions .line.tool-line{
    border-left-color:var(--blue);
  }
  .instructions .line b{ color:var(--accent-2); font-weight:700; }

  /* ---------- TRABAJOS VARIOS: day meta + task cards ---------- */
  .day-meta{
    display:flex;
    flex-wrap:wrap;
    gap:10px 22px;
    margin-bottom:20px;
    padding-bottom:18px;
    border-bottom:1px solid var(--border);
    font-size:13px;
    color:var(--text-1);
  }
  .day-meta span{ display:inline-flex; align-items:center; gap:7px; }
  .day-meta svg{ width:15px; height:15px; color:var(--text-2); }
  .day-meta b{ color:var(--text-0); font-weight:700; }

  .task-card{
    background:var(--bg-2);
    border:1px solid var(--border);
    border-left:3px solid var(--green);
    border-radius:14px;
    padding:16px 18px;
    margin-bottom:14px;
    opacity:0;
    transform:translateY(10px);
    animation:lineIn .4s var(--ease) forwards;
    transition:border-color .3s var(--ease), background .3s var(--ease);
  }
  .task-card:hover{ background:var(--card-hover); border-color:var(--border-strong); }

  .task-top{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:10px;
    margin-bottom:6px;
  }
  .task-loc{
    font-size:11px;
    font-weight:700;
    letter-spacing:.04em;
    text-transform:uppercase;
    color:var(--green);
  }
  .task-badges{ display:flex; gap:6px; flex-wrap:wrap; justify-content:flex-end; }

  .pill{
    display:inline-block;
    font-size:10.5px;
    font-weight:700;
    padding:3px 9px;
    border-radius:999px;
    white-space:nowrap;
    letter-spacing:.02em;
  }
  .pill.prio-a{ background:rgba(255,107,107,0.16); color:#ff8787; }
  .pill.prio-b{ background:var(--accent-soft); color:var(--accent-2); }
  .pill.prio-c{ background:rgba(77,171,247,0.16); color:var(--blue); }
  .pill.prio-n{ background:rgba(255,255,255,0.08); color:var(--text-2); }
  .pill.status-done{ background:rgba(81,207,102,0.16); color:var(--green); }
  .pill.status-progress{ background:rgba(255,212,59,0.16); color:#ffd43b; }
  .pill.status-other{ background:rgba(255,255,255,0.08); color:var(--text-1); }

  .task-equipo{
    margin:0 0 6px;
    font-size:16px;
    font-weight:700;
    letter-spacing:-0.01em;
    color:var(--text-0);
  }
  .task-desc{
    margin:0 0 12px;
    font-size:14px;
    line-height:1.6;
    color:#c7d0da;
  }
  .task-meta{
    display:flex;
    gap:14px;
    flex-wrap:wrap;
    font-size:11.5px;
    color:var(--text-2);
    margin-bottom:10px;
    font-weight:600;
  }
  .op-list{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }
  .op-chip{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:11.5px;
    color:var(--text-1);
    background:rgba(255,255,255,0.05);
    border:1px solid var(--border);
    padding:5px 10px 5px 8px;
    border-radius:999px;
  }
  .op-chip svg{ width:12px; height:12px; color:var(--text-2); }
  .task-incident{
    margin-top:12px;
    font-size:12.5px;
    color:#ffb347;
    background:rgba(255,179,71,0.1);
    border:1px solid rgba(255,179,71,0.25);
    padding:8px 12px;
    border-radius:8px;
  }

  /* scrollbar */
  .detail-body::-webkit-scrollbar{ width:8px; }
  .detail-body::-webkit-scrollbar-thumb{ background:var(--border-strong); border-radius:8px; }
  .detail-body::-webkit-scrollbar-track{ background:transparent; }

  footer.app-footer{
    margin-top:60px;
    text-align:center;
    font-size:12px;
    color:var(--text-2);
    opacity:.7;
  }

  @media (max-width:640px){
    .app{ padding:26px 16px 60px; }
    .zone-card{ padding:24px 20px; }
    .detail-head, .detail-body{ padding-left:20px; padding-right:20px; }
  }
</style>
</head>
<body>

<div class="app">
  <header class="top">
    <div class="brand">
      <div class="brand-mark">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0b0f14" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 1.4 1.4l3.6-3.6a4.5 4.5 0 0 1-6.1 6.1L4.3 19.5a1.5 1.5 0 0 1-2.1-2.1L11.5 8.1a4.5 4.5 0 0 1 6.1-6.1z"/></svg>
      </div>
      <div>
        <h1>PLANTAS</h1>
        <span>Instrucciones de campo por zona y equipo</span>
      </div>
    </div>
    <nav class="breadcrumb" id="breadcrumb"></nav>
  </header>

  <div id="viewport"></div>

  <footer class="app-footer">Selecciona una zona para ver sus equipos</footer>
</div>

<div class="scrim" id="scrim"></div>
<aside class="detail-panel" id="detailPanel">
  <div class="detail-head">
    <div>
      <div class="zone-pill" id="detailZonePill">ZONA</div>
      <h2 id="detailTitle">Equipo</h2>
    </div>
    <button class="close-btn" id="closeBtn" aria-label="Cerrar">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="detail-body">
    <p class="label">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <span id="detailLabelText">Instrucciones para realizar el trabajo</span>
    </p>
    <div class="instructions" id="detailInstructions"></div>
  </div>
</aside>

<script id="data-json" type="application/json">
{
  "PP2": [
    {
      "id": "aaa-valvula-retencion-y-mangueras-teal-pp2",

      "id": "f-308-a-y-b-filtro-c-301",
      "name": "F-308-A y B (Filtro C-301)",
      "general": false,
      "instructions": "Filtro del compresor (El filtro \"A\" es el de difícil acceso, el \"B\" es mas cómodo de hacer)\n\nSubiendo las escalerillas al compresor, final de planta \n\nJunta 8\" (encastrada de grafito aunque en ocasiones se ha hecho a mano de cartón) Llave 36\n\nJunta 1/2\" 300 Espirometalica Llave 22\n\nTraje teal"
    },
    {
      "id": "p-502a-b",
      "name": "P-502A-B",
      "general": false,
      "instructions": "Limpiar filtros\n\n2 Juntas Espiro 4\"150 (cada filtro) Llave 27"
    }
  ],
  "PBD": [
    {
      "id": "aaa-grado-cable",
      "name": "Grado cable",
      "general": true,
      "instructions": "El grado cable son 3 permisos:\n\nFE-2059A (Filtro imanes)\n\nRejillas salida aire (Al lado silo ME-2055)\n\nFiltros ventiladores (Torre de mezcla):\n\nPZ-2021-A,b,c,d,e y f\n\nPZ-2024-A,b,c,d,e,f y g\n\nPZ-2036 (Pelletron) arriba de todo\n\nHacen falta unos 15 filtros de 500x500 y  1 filtro de 1000x1200 para el pelletron"
    },
    {
      "id": "fe-2059a",
      "name": "FE-2059A",
      "general": false,
      "instructions": "Equipo grado cable, filtro imanes\n\nTapa 18\"150 Llave 46 Junta Teflón (No suele cambiarse)\n\nLos filtros se desenroscan a mano y se limpian con un trapo\n\nEstan bastante viejos y torcidos, al roscarlos con medio giro es suficiente, sin apretar sino no hay forma de aflojarlo a la siguiente vez"
    },
    {
      "id": "fz-1113",
      "name": "FZ-1113",
      "general": false,
      "instructions": "A la entrada del extrusor, frente al ME-1056. A ras de suelo\n\nTapa \"custom\", Junta torica     (El diámetro es entre 2 y 3 pulgadas)\n\nLlave 24\n\nEquipo y espárragos de INOX"
    },
    {
      "id": "fz-2063",
      "name": "FZ-2063",
      "general": false,
      "instructions": "Dentro extrusor, a ras de suelo junto a la criba\n\nTapa 8\"150    Llave 32    (La junta es de teflón, se suele usar la misma)\n\n1 Cartucho de plástico\n\nSi no hay recambio se limpia como se pueda. Equipo y tornillería de INOX"
    },
    {
      "id": "pc-1038a-b-c-d",
      "name": "PC-1038A-B-C-D",
      "general": false,
      "instructions": "Al lado refrigerantes, a ras de suelo. Reaccion\n\nPara limpiar los filtros:\n\nEl \"A\" y \"D\" son Llave 22\n\nEl \"B\" y \"C\" son Llave 27\n\nLas juntas son de cartón cortadas a mano"
    },
    {
      "id": "pc-2038a-b-c-d",
      "name": "PC-2038A-B-C-D",
      "general": false,
      "instructions": "Al lado refrigerantes, a ras de suelo. Reaccion\n\nPara limpiar los filtros:\n\nEl \"A\" es Llave 27\n\nEl \"B\",\"C\" y \"D\" son Llave 22\n\nLas juntas son de cartón cortadas a mano"
    },
    {
      "id": "px-3002a-b",
      "name": "PX-3002A-B",
      "general": false,
      "instructions": "Al lado balsa de los patos, Servicios\n\nPara limpiar filtros:\n\nImpulsion-  2 Juntas cartón 8\"150   Llave 32  (El filtro es una raqueta)\n\nAspiracion- 1 Junta cartón 3\"150 y 2 juntas 8\"150 cartón  Llave 24, (27) y 32   (Es una reducción)"
    },
    {
      "id": "te-1056-b",
      "name": "TE-1056-B",
      "general": false,
      "instructions": "Primera Plataforma frente a taller de PBD\n\nDe izquierda a derecha es el primer intercambiador\n\n2 DD/CC de 6\"150 Lado carcasa   Llave 32\n\nCabezales Llave 32\n\n2 Bridas distribuidora 8\"150 Llave 32\n\nLa tornillería de la flotante es Llave 32 y el cancamo para sacarlo con la grua M-20\n\nHace falta grua para los cabezales y flotante\n\nHace falta andamio para llegar a 1 DD/CC lado carcasa y para los cabezales y bridas distribuidora\n\nAl sacar la distribuidora hay que colocar 2 BB/CC 8\"150\n\nPara la PP/HH (tanto lado carcasa como lado proceso) se puede elegir hacer la prueba o bien montando acoples roscados de 3/4 NPT (Tanto el llenado como el venteo) o por las bridas de 1 1/2\"300 (Tanto el llenado como el venteo)\n\nPP/HH lado tubos 7,50Kg, Lado carcasa 12Kg\n\nLas juntas metaloplasticas se montan con camprofile de 10 o 12mm por las 2 caras\n\nSi se desmonta el haz tubular hay que pedir permiso para desmontar barandilla\n\nEn este no van los aros de prueba rojos que hay en la planta inferior\n\nHay un Aro (el aro es nuevo, no lo hemos probado, el que mira a taller) para poder hacer pp/hh lado carcasa y ver si hay fugas desde un lado (el otro tiene que estar montado con flotante y cabezal por falta de ese aro)"
    },
    {
      "id": "te-2056",
      "name": "TE-2056",
      "general": false,
      "instructions": "Primera Plataforma frente a taller de PBD\n\nDe izquierda a derecha es el tercer intercambiador\n\n2 DD/CC de 6\"150 Lado carcasa   Llave 32\n\nCabezales Llave 32\n\n2 Bridas distribuidora 6\"150 Llave 32\n\nLa tornillería de la flotante es Llave 32 y el cancamo para sacarlo con la grua M-22\n\nHace falta grua para los cabezales y flotante\n\nHace falta andamio para llegar a los 2 DD/CC lado carcasa y para los cabezales y brida distribuidora\n\nAl sacar la distribuidora hay que colocar 2 BB/CC 6\"150\n\nPara la PP/HH (tanto lado carcasa como lado proceso) se puede elegir hacer la prueba o bien montando acoples roscados de 3/4 NPT (Tanto el llenado como el venteo) o por las bridas de 1 1/2\"300 (Tanto el llenado como el venteo)\n\nPP/HH lado tubos 7,12Kg, lado carcasa 10,50Kg\n\nSe monta Goretex en los aros de prueba para hacer las PP/HH, la empaquetadura del aro es de 10mm\n\nLas juntas metaloplasticas se montan con camprofile de 10 o 12mm por las 2 caras\n\nSi se desmonta el haz tubular hay que pedir permiso para desmontar barandilla\n\nEn este si van los aros de prueba (los de color rojo espirrados a la pared del piso inferior)"
    }

  {

    color: "#51cf66",
    bg: "rgba(81,207,102,0.14)",
    icon: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg>`

  {

    color: "#b197fc",
    bg: "rgba(177,151,252,0.14)",
    icon: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="3"/><path d="M9 9h6v6H9z"/><path d="M9 2v2M15 2v2M9 20v2M15 20v2M2 9h2M2 15h2M20 9h2M20 15h2"/></svg>`
  }
];

const viewport = document.getElementById('viewport');
const breadcrumbEl = document.getElementById('breadcrumb');
const footerEl = document.querySelector('.app-footer');

let state = { zone: null, month: null, search: "" };

function zoneMeta(key){ return ZONES.find(z => z.key === key); }

function iconChevronRight(){
  return `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>`;
}
function iconSearch(){
  return `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>`;
}
function iconArrowUpRight(){
  return `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7M8 7h9v9"/></svg>`;
}
function iconLeft(){
  return `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg>`;
}
function iconBox(){
  return `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8l-9-5-9 5 9 5 9-5zM3 8v8l9 5 9-5V8M12 13v8"/></svg>`;
}

function renderBreadcrumb(){
  let html = `<span class="crumb clickable" data-nav="home">Zonas</span>`;
  if(state.zone){
    const z = zoneMeta(state.zone);
    if(state.zone === 'TrabajosVarios' && state.month){
      html += `<span class="sep">/</span><span class="crumb clickable" data-nav="zone">${z.title}</span>`;
      html += `<span class="sep">/</span><span class="crumb current">${state.month}</span>`;
    } else {
      html += `<span class="sep">/</span><span class="crumb current">${z.title}</span>`;
    }
  }
  breadcrumbEl.innerHTML = html;
  breadcrumbEl.querySelectorAll('[data-nav="home"]').forEach(el => el.addEventListener('click', goHome));
  breadcrumbEl.querySelectorAll('[data-nav="zone"]').forEach(el => el.addEventListener('click', goToMonths));
}

function transitionTo(renderFn){
  const current = viewport.firstElementChild;
  if(current){
    current.classList.add('view-exit');
    setTimeout(() => {
      viewport.innerHTML = '';
      const el = renderFn();
      el.classList.add('view-enter');
      viewport.appendChild(el);
    }, 260);
  } else {
    const el = renderFn();
    el.classList.add('view-enter');
    viewport.appendChild(el);
  }
}

function goHome(){
  state.zone = null;
  state.month = null;
  state.search = "";
  renderBreadcrumb();
  footerEl.textContent = "Selecciona una zona para ver sus equipos";
  transitionTo(renderZones);
}

function openZone(key){
  state.zone = key;
  state.month = null;
  state.search = "";
  renderBreadcrumb();
  const z = zoneMeta(key);
  footerEl.textContent = z.desc;
  if(key === 'TrabajosVarios'){
    transitionTo(renderMonths);
  } else {
    transitionTo(() => renderEquipList(key));
  }
}

function goToMonths(){
  state.month = null;
  renderBreadcrumb();
  const z = zoneMeta('TrabajosVarios');
  footerEl.textContent = z.desc;
  transitionTo(renderMonths);
}

function openMonth(month){
  state.month = month;
  renderBreadcrumb();
  footerEl.textContent = `${month} · Trabajos Varios`;
  transitionTo(() => renderDayList(month));
}

function renderZones(){
  const wrap = document.createElement('div');
  wrap.className = 'view';
  const grid = document.createElement('div');
  grid.className = 'zone-grid';

  ZONES.forEach(z => {
    const isTrabajos = z.key === 'TrabajosVarios';
    const count = isTrabajos ? TOTAL_JORNADAS : (DATA[z.key] || []).length;
    const label = isTrabajos ? (count === 1 ? 'jornada' : 'jornadas') : (count === 1 ? 'equipo' : 'equipos');
    const card = document.createElement('div');
    card.className = 'zone-card';
    card.style.setProperty('--zone-color', z.color);
    card.style.setProperty('--zone-bg', z.bg);
    card.style.setProperty('--zone-glow', z.bg);
    card.innerHTML = `
      <div class="zone-icon">${z.icon}</div>
      <h2>${z.title}</h2>
      <p>${z.desc}</p>
      <div class="zone-count"><span class="dot"></span>${count} ${label}</div>
      <div class="zone-arrow">${iconChevronRight()}</div>
    `;
    card.addEventListener('click', () => openZone(z.key));
    grid.appendChild(card);
  });

  wrap.appendChild(grid);
  return wrap;
}

function renderEquipList(key){
  const z = zoneMeta(key);
  const items = DATA[key] || [];

  const wrap = document.createElement('div');
  wrap.className = 'view';

  const back = document.createElement('button');
  back.className = 'back-btn';
  back.innerHTML = `${iconLeft()} Volver a zonas`;
  back.addEventListener('click', goHome);
  wrap.appendChild(back);

  const searchWrap = document.createElement('div');
  searchWrap.className = 'search-wrap';
  searchWrap.innerHTML = `${iconSearch()}<input type="text" placeholder="Buscar equipo, por ejemplo E-663..." id="searchInput">`;
  wrap.appendChild(searchWrap);

  const header = document.createElement('div');
  header.className = 'list-header';
  header.innerHTML = `<h2>${z.title} <span class="badge" id="countBadge">${items.length}</span></h2><span class="sub">${z.desc}</span>`;
  wrap.appendChild(header);

  const gridHolder = document.createElement('div');
  wrap.appendChild(gridHolder);

  function renderGrid(filter){
    const filtered = items.filter(it => it.name.toLowerCase().includes(filter.toLowerCase()));
    document.getElementById('countBadge') && (document.getElementById('countBadge').textContent = filtered.length);

    if(items.length === 0){
      gridHolder.innerHTML = '';
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.innerHTML = `
        ${iconBox()}
        <h3>Todavía no hay equipos cargados</h3>
        <p>Esta zona (${z.title}) está lista para recibir instrucciones de trabajo. Añade archivos de equipo para verlos aquí.</p>`;
      gridHolder.appendChild(empty);
      return;
    }

    if(filtered.length === 0){
      gridHolder.innerHTML = `<div class="empty-state">${iconBox()}<h3>Sin resultados</h3><p>No se encontró ningún equipo que coincida con "${filter}".</p></div>`;
      return;
    }

    const grid = document.createElement('div');
    grid.className = 'equip-grid';
    filtered.forEach((it, i) => {
      const card = document.createElement('div');
      card.className = 'equip-card' + (it.general ? ' general' : '');
      card.style.animationDelay = (i * 0.03) + 's';
      const preview = it.instructions.split('\n').find(l => l.trim().length > 0) || '';
      card.innerHTML = `
        <span class="tag">${it.general ? 'Nota general' : 'Equipo'}</span>
        <h3>${it.name}</h3>
        <p class="preview">${preview}</p>
        <div class="go">Ver instrucciones ${iconArrowUpRight()}</div>
      `;
      card.addEventListener('click', () => openDetail(key, it));
      grid.appendChild(card);
    });
    gridHolder.innerHTML = '';
    gridHolder.appendChild(grid);
  }

  renderGrid('');
  searchWrap.querySelector('#searchInput').addEventListener('input', (e) => {
    renderGrid(e.target.value);
  });

  return wrap;
}

function iconCalendar(){
  return `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg>`;
}
function iconClock(){
  return `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>`;
}
function iconUser(){
  return `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c1.5-4.5 5-6 8-6s6.5 1.5 8 6"/></svg>`;
}
function escapeHtml(str){
  return String(str == null ? '' : str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function formatDate(iso){
  if(!iso) return null;
  const d = new Date(iso + 'T00:00:00');
  if(isNaN(d.getTime())) return null;
  let s = d.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  return s.charAt(0).toUpperCase() + s.slice(1);
}
function formatDateShort(iso){
  if(!iso) return null;
  const d = new Date(iso + 'T00:00:00');
  if(isNaN(d.getTime())) return null;
  let s = d.toLocaleDateString('es-ES', { day: 'numeric', month: 'long' });
  return s;
}

function renderMonths(){
  const wrap = document.createElement('div');
  wrap.className = 'view';
  const z = zoneMeta('TrabajosVarios');

  const back = document.createElement('button');
  back.className = 'back-btn';
  back.innerHTML = `${iconLeft()} Volver a zonas`;
  back.addEventListener('click', goHome);
  wrap.appendChild(back);

  const header = document.createElement('div');
  header.className = 'list-header';
  header.innerHTML = `<h2>${z.title}</h2><span class="sub">${z.desc}</span>`;
  wrap.appendChild(header);

  const months = MONTH_ORDER.filter(m => TRABAJOS_VARIOS[m] && TRABAJOS_VARIOS[m].length > 0);

  if(months.length === 0){
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.innerHTML = `${iconBox()}<h3>Sin jornadas cargadas</h3><p>Todavía no hay distribuciones diarias disponibles.</p>`;
    wrap.appendChild(empty);
    return wrap;
  }

  const grid = document.createElement('div');
  grid.className = 'zone-grid';
  months.forEach((m, i) => {
    const days = TRABAJOS_VARIOS[m];
    const totalTasks = days.reduce((s, d) => s + d.tasks.length, 0);
    const card = document.createElement('div');
    card.className = 'zone-card';
    card.style.setProperty('--zone-color', z.color);
    card.style.setProperty('--zone-bg', z.bg);
    card.style.setProperty('--zone-glow', z.bg);
    card.style.animationDelay = (i * 0.06) + 's';
    card.innerHTML = `
      <div class="zone-icon">${iconCalendar()}</div>
      <h2>${m}</h2>
      <p>${days.length} ${days.length === 1 ? 'jornada registrada' : 'jornadas registradas'}</p>
      <div class="zone-count"><span class="dot"></span>${totalTasks} trabajos</div>
      <div class="zone-arrow">${iconChevronRight()}</div>
    `;
    card.addEventListener('click', () => openMonth(m));
    grid.appendChild(card);
  });
  wrap.appendChild(grid);
  return wrap;
}

function renderDayList(month){
  const days = TRABAJOS_VARIOS[month] || [];
  const wrap = document.createElement('div');
  wrap.className = 'view';

  const back = document.createElement('button');
  back.className = 'back-btn';
  back.innerHTML = `${iconLeft()} Volver a meses`;
  back.addEventListener('click', goToMonths);
  wrap.appendChild(back);

  const header = document.createElement('div');
  header.className = 'list-header';
  header.innerHTML = `<h2>${month} <span class="badge">${days.length}</span></h2><span class="sub">Jornadas con distribución de trabajos</span>`;
  wrap.appendChild(header);

  if(days.length === 0){
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.innerHTML = `${iconBox()}<h3>Sin jornadas este mes</h3><p>No hay distribuciones diarias registradas para ${month}.</p>`;
    wrap.appendChild(empty);
    return wrap;
  }

  const grid = document.createElement('div');
  grid.className = 'equip-grid';
  days.forEach((d, i) => {
    const card = document.createElement('div');
    card.className = 'equip-card';
    card.style.animationDelay = (i * 0.03) + 's';
    const dateFormatted = formatDateShort(d.date_iso) || d.date_label;
    card.innerHTML = `
      <span class="tag">${d.tasks.length} ${d.tasks.length === 1 ? 'trabajo' : 'trabajos'}</span>
      <h3>${escapeHtml(dateFormatted)}</h3>
      <p class="preview">Jefe de equipo: ${escapeHtml(d.jefe_equipo || '—')}</p>
      <div class="go">Ver distribución ${iconArrowUpRight()}</div>
    `;
    card.addEventListener('click', () => openDayDetail(month, d));
    grid.appendChild(card);
  });
  wrap.appendChild(grid);
  return wrap;
}

function priorityBadge(p){
  const map = {
    'A': { label: 'Prioridad A', cls: 'prio-a' },
    'B': { label: 'Prioridad B', cls: 'prio-b' },
    'C': { label: 'Prioridad C', cls: 'prio-c' },
  };
  const key = (p || '').replace(/"/g,'').trim();
  const info = map[key] || { label: key ? `Prioridad ${key}` : '', cls: 'prio-n' };
  if(!info.label) return '';
  return `<span class="pill ${info.cls}">${escapeHtml(info.label)}</span>`;
}
function statusBadge(estado, estadoOt){
  const e = (estado || '').trim();
  const eot = (estadoOt || '').trim();
  if(eot.toUpperCase() === 'FINA' || e.toUpperCase() === 'T'){
    return `<span class="pill status-done">Finalizado</span>`;
  }
  if(e.toUpperCase() === 'C'){
    return `<span class="pill status-progress">En curso</span>`;
  }
  if(!e && !eot) return '';
  return `<span class="pill status-other">${escapeHtml(eot || e)}</span>`;
}

function taskCardHtml(t, i){
  const opsHtml = (t.operarios || []).map(o => {
    const horas = (o.horas !== null && o.horas !== undefined && o.horas !== '') ? ` · ${o.horas}h` : '';
    return `<span class="op-chip">${iconUser()}${escapeHtml(o.nombre)}${horas}</span>`;
  }).join('');

  return `
    <div class="task-card" style="animation-delay:${i * 0.05}s">
      <div class="task-top">
        <div class="task-loc">${escapeHtml(t.ubicacion || 'Ubicación no especificada')}</div>
        <div class="task-badges">${priorityBadge(t.prioridad)}${statusBadge(t.estado, t.estado_ot)}</div>
      </div>
      <h4 class="task-equipo">${escapeHtml(t.equipo || '—')}</h4>
      <p class="task-desc">${escapeHtml(t.descripcion || 'Sin descripción')}</p>
      <div class="task-meta">
        ${t.ot ? `<span>OT ${escapeHtml(t.ot)}${t.op ? ' / OP ' + escapeHtml(t.op) : ''}</span>` : ''}
        ${t.tipologia ? `<span>${escapeHtml(t.tipologia)}${t.clase ? ' · ' + escapeHtml(t.clase) : ''}</span>` : ''}
      </div>
      ${opsHtml ? `<div class="op-list">${opsHtml}</div>` : ''}
      ${t.incidencias ? `<div class="task-incident">⚠ ${escapeHtml(t.incidencias)}</div>` : ''}
    </div>
  `;
}

function openDayDetail(month, day){
  const z = zoneMeta('TrabajosVarios');
  detailZonePill.textContent = `Trabajos Varios · ${month}`;
  detailZonePill.style.setProperty('--zone-color', z.color);
  detailZonePill.style.setProperty('--zone-bg', z.bg);
  detailTitle.textContent = formatDate(day.date_iso) || day.date_label;
  document.getElementById('detailLabelText').textContent = 'Distribución de trabajos de la jornada';

  const tasksHtml = (day.tasks || []).map((t, i) => taskCardHtml(t, i)).join('');
  detailInstructions.innerHTML = `
    <div class="day-meta">
      <span>${iconUser()} Jefe de equipo: <b>${escapeHtml(day.jefe_equipo || '—')}</b></span>
      <span>${iconClock()} ${day.tasks.length} ${day.tasks.length === 1 ? 'trabajo' : 'trabajos'}</span>
    </div>
    ${tasksHtml || `<p style="color:var(--text-2);">No hay trabajos registrados en esta jornada.</p>`}
  `;

  scrim.classList.add('open');
  panel.classList.add('open');
  document.body.style.overflow = 'hidden';
}

/* ---------- DETAIL PANEL ---------- */
const scrim = document.getElementById('scrim');
const panel = document.getElementById('detailPanel');
const closeBtn = document.getElementById('closeBtn');
const detailTitle = document.getElementById('detailTitle');
const detailZonePill = document.getElementById('detailZonePill');
const detailInstructions = document.getElementById('detailInstructions');

function openDetail(zoneKey, item){
  const z = zoneMeta(zoneKey);
  detailZonePill.textContent = z.title;
  detailZonePill.style.setProperty('--zone-color', z.color);
  detailZonePill.style.setProperty('--zone-bg', z.bg);
  detailTitle.textContent = item.name;
  document.getElementById('detailLabelText').textContent = 'Instrucciones para realizar el trabajo';

  const toolWords = /(llave|grifa|explosimetro|traje|andamio|grua|tapon|tapones)/i;
  const lines = item.instructions.split('\n').filter(l => l.trim().length > 0);
  detailInstructions.innerHTML = lines.map((line, i) => {
    const isTool = toolWords.test(line);
    const safe = line.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return `<div class="line${isTool ? ' tool-line' : ''}" style="animation-delay:${i * 0.045}s">${safe}</div>`;
  }).join('');

  scrim.classList.add('open');
  panel.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDetail(){
  scrim.classList.remove('open');
  panel.classList.remove('open');
  document.body.style.overflow = '';
}

scrim.addEventListener('click', closeDetail);
closeBtn.addEventListener('click', closeDetail);
document.addEventListener('keydown', (e) => { if(e.key === 'Escape') closeDetail(); });

/* ---------- INIT ---------- */
renderBreadcrumb();
viewport.appendChild(renderZones());
</script>
