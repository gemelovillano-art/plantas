<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plantas</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Plantas">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0b0f14">
<style>
  :root{
    --bg-0:#0b0f14;
    --bg-1:#10161d;
    --bg-2:#161d26;
    --card:#141b23;
    --card-hover:#1b2430;
    --border:rgba(255,255,255,0.08);
    --border-strong:rgba(255,255,255,0.16);
    --text-0:#eef2f6;
    --text-1:#aab4c0;
    --text-2:#6f7b88;
    --accent:#ff8a3d;
    --accent-2:#ffb347;
    --accent-soft:rgba(255,138,61,0.14);
    --blue:#4dabf7;
    --green:#51cf66;
    --purple:#b197fc;
    --radius-lg:22px;
    --radius-md:16px;
    --radius-sm:10px;
    --shadow:0 20px 50px -20px rgba(0,0,0,0.6);
    --ease:cubic-bezier(.22,1,.36,1);
  }

  *{box-sizing:border-box;}
  [hidden]{ display:none !important; }
  html,body{height:100%;}
  body{
    margin:0;
    font-family:"Inter","Segoe UI",system-ui,-apple-system,sans-serif;
    background:
      radial-gradient(1200px 600px at 15% -10%, rgba(255,138,61,0.10), transparent 60%),
      radial-gradient(900px 500px at 110% 10%, rgba(77,171,247,0.10), transparent 55%),
      var(--bg-0);
    color:var(--text-0);
    min-height:100%;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }

  .app{
    max-width:1180px;
    margin:0 auto;
    padding:40px 24px 80px;
    position:relative;
  }

  /* ---------- HEADER ---------- */
  header.top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    margin-bottom:38px;
    flex-wrap:wrap;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:14px;
  }
  .brand-mark{
    width:46px;height:46px;
    border-radius:14px;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 10px 30px -8px rgba(255,138,61,0.55);
    flex-shrink:0;
  }
  .brand-mark svg{width:24px;height:24px;}
  .brand h1{
    font-size:19px;
    font-weight:700;
    margin:0;
    letter-spacing:-0.01em;
  }
  .brand span{
    display:block;
    font-size:12.5px;
    color:var(--text-2);
    font-weight:500;
    margin-top:2px;
  }

  .breadcrumb{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:13.5px;
    color:var(--text-1);
    flex-wrap:wrap;
  }
  .breadcrumb .crumb{
    display:flex;align-items:center;gap:8px;
    cursor:pointer;
    padding:6px 12px;
    border-radius:999px;
    transition:background .25s var(--ease), color .25s var(--ease);
  }
  .breadcrumb .crumb.clickable:hover{ background:var(--accent-soft); color:var(--accent-2); }
  .breadcrumb .crumb.current{ color:var(--text-0); font-weight:600; }
  .breadcrumb .sep{ color:var(--text-2); opacity:.6; }

  /* ---------- SEARCH ---------- */
  .search-wrap{
    position:relative;
    margin-bottom:26px;
    opacity:0;
    transform:translateY(8px);
    animation:fadeUp .5s var(--ease) forwards;
    animation-delay:.05s;
  }
  .search-wrap input{
    width:100%;
    padding:15px 18px 15px 46px;
    border-radius:var(--radius-md);
    border:1px solid var(--border);
    background:var(--bg-2);
    color:var(--text-0);
    font-size:14.5px;
    outline:none;
    transition:border-color .25s var(--ease), background .25s var(--ease), box-shadow .25s var(--ease);
  }
  .search-wrap input:focus{
    border-color:var(--accent);
    box-shadow:0 0 0 4px var(--accent-soft);
  }
  .search-wrap svg{
    position:absolute; left:16px; top:50%; transform:translateY(-50%);
    width:18px;height:18px; color:var(--text-2);
    pointer-events:none;
  }

  /* ---------- VIEWS / TRANSITIONS ---------- */
  .view{
    position:relative;
  }
  .view-exit{
    animation:viewOut .32s var(--ease) forwards;
  }
  .view-enter{
    animation:viewIn .45s var(--ease) forwards;
  }
  @keyframes viewOut{
    to{ opacity:0; transform:translateY(-10px) scale(.985); }
  }
  @keyframes viewIn{
    from{ opacity:0; transform:translateY(14px) scale(.98); }
    to{ opacity:1; transform:translateY(0) scale(1); }
  }
  @keyframes fadeUp{
    to{ opacity:1; transform:translateY(0); }
  }

  /* ---------- ZONE GRID ---------- */
  .zone-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(230px,1fr));
    gap:20px;
  }
  .zone-card{
    position:relative;
    border-radius:var(--radius-lg);
    padding:30px 26px;
    background:linear-gradient(160deg, var(--card), var(--bg-1));
    border:1px solid var(--border);
    cursor:pointer;
    overflow:hidden;
    isolation:isolate;
    transition:transform .4s var(--ease), border-color .4s var(--ease), box-shadow .4s var(--ease);
    opacity:0;
    transform:translateY(16px);
    animation:fadeUp .55s var(--ease) forwards;
  }
  .zone-card:nth-child(1){animation-delay:.05s;}
  .zone-card:nth-child(2){animation-delay:.12s;}
  .zone-card:nth-child(3){animation-delay:.19s;}
  .zone-card:nth-child(4){animation-delay:.26s;}

  .zone-card::before{
    content:"";
    position:absolute; inset:0;
    background:radial-gradient(220px 220px at 85% -10%, var(--zone-glow, rgba(255,138,61,.25)), transparent 65%);
    opacity:.7;
    z-index:-1;
    transition:opacity .4s var(--ease);
  }
  .zone-card:hover{
    transform:translateY(-6px);
    border-color:var(--border-strong);
    box-shadow:var(--shadow);
  }
  .zone-card:hover::before{ opacity:1; }
  .zone-card:active{ transform:translateY(-2px) scale(.99); }

  .zone-icon{
    width:52px;height:52px;
    border-radius:14px;
    display:flex;align-items:center;justify-content:center;
    margin-bottom:22px;
    background:var(--zone-bg, var(--accent-soft));
    color:var(--zone-color, var(--accent));
    transition:transform .4s var(--ease);
  }
  .zone-card:hover .zone-icon{ transform:scale(1.08) rotate(-4deg); }
  .zone-icon svg{width:26px;height:26px;}

  .zone-card h2{
    font-size:22px;
    margin:0 0 6px;
    font-weight:700;
    letter-spacing:-0.01em;
  }
  .zone-card p{
    margin:0;
    font-size:13.5px;
    color:var(--text-1);
  }
  .zone-count{
    display:inline-flex;
    align-items:center;
    gap:6px;
    margin-top:18px;
    font-size:12.5px;
    color:var(--text-2);
    font-weight:600;
    letter-spacing:.02em;
  }
  .zone-count .dot{
    width:6px;height:6px;border-radius:50%;
    background:var(--zone-color, var(--accent));
  }
  .zone-arrow{
    position:absolute;
    right:24px; bottom:24px;
    width:34px;height:34px;
    border-radius:50%;
    border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center;
    color:var(--text-2);
    transition:transform .4s var(--ease), color .4s var(--ease), border-color .4s var(--ease), background .4s var(--ease);
  }
  .zone-card:hover .zone-arrow{
    transform:translate(3px,-3px);
    color:var(--bg-0);
    background:var(--zone-color, var(--accent));
    border-color:transparent;
  }
  .zone-arrow svg{width:15px;height:15px;}

  /* ---------- EQUIPMENT LIST ---------- */
  .list-header{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:18px;
    gap:12px;
    flex-wrap:wrap;
  }
  .list-header h2{
    font-size:26px;
    margin:0;
    font-weight:700;
    letter-spacing:-0.01em;
    display:flex; align-items:center; gap:12px;
  }
  .list-header .badge{
    font-size:12px;
    font-weight:700;
    padding:4px 11px;
    border-radius:999px;
    background:var(--accent-soft);
    color:var(--accent-2);
  }
  .list-header .sub{
    font-size:13px;
    color:var(--text-2);
  }

  .equip-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(220px,1fr));
    gap:14px;
  }
  .equip-card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:var(--radius-md);
    padding:18px 18px 16px;
    cursor:pointer;
    transition:transform .3s var(--ease), border-color .3s var(--ease), background .3s var(--ease), box-shadow .3s var(--ease);
    opacity:0;
    transform:translateY(10px);
    animation:fadeUp .4s var(--ease) forwards;
    position:relative;
    overflow:hidden;
  }
  .equip-card.general{
    border-color:rgba(255,179,71,0.35);
    background:linear-gradient(160deg, rgba(255,138,61,0.09), var(--card));
  }
  .equip-card:hover{
    transform:translateY(-4px);
    border-color:var(--border-strong);
    background:var(--card-hover);
    box-shadow:0 16px 34px -18px rgba(0,0,0,.7);
  }
  .equip-card .tag{
    display:inline-block;
    font-size:10.5px;
    font-weight:700;
    letter-spacing:.06em;
    text-transform:uppercase;
    color:var(--accent-2);
    margin-bottom:8px;
  }
  .equip-card h3{
    margin:0 0 8px;
    font-size:16.5px;
    font-weight:700;
    letter-spacing:-0.01em;
  }
  .equip-card .preview{
    margin:0;
    font-size:12.5px;
    color:var(--text-2);
    line-height:1.5;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .equip-card .go{
    margin-top:12px;
    display:flex;align-items:center;gap:6px;
    font-size:12px;font-weight:600;
    color:var(--text-2);
    transition:color .3s var(--ease), gap .3s var(--ease);
  }
  .equip-card:hover .go{ color:var(--accent-2); gap:9px; }
  .equip-card .go svg{width:13px;height:13px;}

  .empty-state{
    text-align:center;
    padding:70px 20px;
    color:var(--text-2);
    border:1px dashed var(--border);
    border-radius:var(--radius-lg);
  }
  .empty-state svg{width:40px;height:40px; margin-bottom:14px; opacity:.5;}
  .empty-state h3{ color:var(--text-1); margin:0 0 6px; font-size:16px; }
  .empty-state p{ margin:0; font-size:13.5px; max-width:360px; margin:0 auto; }

  .login-gate{
    text-align:center;
    padding:100px 20px;
    max-width:420px;
    margin:0 auto;
  }
  .login-gate-icon{
    width:56px; height:56px;
    margin:0 auto 22px;
    border-radius:16px;
    background:var(--accent-soft);
    color:var(--accent-2);
    display:flex; align-items:center; justify-content:center;
  }
  .login-gate-icon svg{ width:26px; height:26px; }
  .login-gate h2{ font-size:20px; margin:0 0 10px; color:var(--text-0); }
  .login-gate p{ font-size:14px; color:var(--text-1); line-height:1.6; margin:0; }

  /* ---------- BACK BUTTON ---------- */
  .back-btn{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:var(--bg-2);
    border:1px solid var(--border);
    color:var(--text-1);
    padding:9px 16px 9px 12px;
    border-radius:999px;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    margin-bottom:22px;
    transition:background .25s var(--ease), color .25s var(--ease), border-color .25s var(--ease), transform .25s var(--ease);
  }
  .back-btn:hover{
    background:var(--accent-soft);
    color:var(--accent-2);
    border-color:rgba(255,138,61,0.3);
    transform:translateX(-2px);
  }
  .back-btn svg{width:14px;height:14px;}

  /* ---------- AUTH BOX ---------- */
  .auth-box{ position:relative; }
  .auth-btn{
    background:var(--bg-2);
    border:1px solid var(--border);
    color:var(--text-1);
    padding:9px 16px;
    border-radius:999px;
    font-size:12.5px;
    font-weight:600;
    cursor:pointer;
    transition:background .25s var(--ease), color .25s var(--ease), border-color .25s var(--ease);
  }
  .auth-btn:hover{ background:var(--accent-soft); color:var(--accent-2); border-color:rgba(255,138,61,0.3); }
  .auth-btn{ display:inline-flex; align-items:center; gap:9px; }
  .auth-avatar{
    width:22px; height:22px;
    border-radius:50%;
    object-fit:cover;
    border:1.5px solid var(--accent-2);
    flex-shrink:0;
  }
  .auth-pop{
    display:none;
    flex-direction:column;
    gap:10px;
    position:absolute;
    top:calc(100% + 10px);
    right:0;
    background:var(--bg-1);
    border:1px solid var(--border-strong);
    border-radius:14px;
    padding:16px;
    width:240px;
    box-shadow:var(--shadow);
    z-index:50;
  }
  .auth-pop.open{ display:flex; }
  .auth-pop input{
    width:100%;
    padding:10px 12px;
    border-radius:10px;
    border:1px solid var(--border);
    background:var(--bg-2);
    color:var(--text-0);
    font-size:13.5px;
    outline:none;
  }
  .auth-pop input:focus{ border-color:var(--accent); }
  .auth-pop button{
    background:var(--accent);
    color:#0b0f14;
    border:none;
    padding:10px;
    border-radius:10px;
    font-weight:700;
    font-size:13.5px;
    cursor:pointer;
    transition:filter .2s var(--ease);
  }
  .auth-pop button:hover{ filter:brightness(1.08); }
  .auth-error{ color:#ff8787; font-size:12px; margin:0; min-height:14px; }

  /* ---------- ADMIN: banners, buttons, forms ---------- */

  .btn-primary{
    background:var(--accent);
    color:#0b0f14;
    border:none;
    padding:11px 18px;
    border-radius:12px;
    font-weight:700;
    font-size:13.5px;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    gap:8px;
    white-space:nowrap;
    transition:filter .2s var(--ease), transform .2s var(--ease);
  }
  .btn-primary:hover{ filter:brightness(1.08); transform:translateY(-1px); }
  .btn-primary svg{ width:16px; height:16px; }
  .btn-primary:disabled{ opacity:.6; cursor:default; transform:none; }

  .btn-secondary{
    background:var(--bg-2);
    border:1px solid var(--border);
    color:var(--text-1);
    padding:11px 18px;
    border-radius:12px;
    font-weight:600;
    font-size:13.5px;
    cursor:pointer;
    transition:background .2s var(--ease), color .2s var(--ease);
  }
  .btn-secondary:hover{ background:var(--card-hover); color:var(--text-0); }

  .list-header{ align-items:flex-start; }
  .add-btn{ flex-shrink:0; }

  .card-pencil{
    position:absolute;
    top:14px; right:14px;
    width:30px; height:30px;
    border-radius:50%;
    border:1px solid var(--border);
    background:var(--bg-1);
    color:var(--text-2);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    transition:background .2s var(--ease), color .2s var(--ease), border-color .2s var(--ease);
  }
  .card-pencil:hover{ background:var(--accent-soft); color:var(--accent-2); border-color:rgba(255,138,61,0.3); }
  .card-pencil svg{ width:14px; height:14px; }
  .equip-card{ position:relative; }

  .detail-head-actions{ display:flex; align-items:center; gap:8px; flex-shrink:0; }
  .icon-btn{
    width:38px; height:38px;
    border-radius:50%;
    border:1px solid var(--border);
    background:var(--bg-2);
    color:var(--text-1);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    transition:background .25s var(--ease), color .25s var(--ease), border-color .25s var(--ease);
  }
  .icon-btn svg{ width:16px; height:16px; }
  .edit-btn:hover{ background:rgba(77,171,247,0.14); color:var(--blue); border-color:rgba(77,171,247,0.3); }
  .delete-btn:hover{ background:rgba(255,107,107,0.14); color:#ff8787; border-color:rgba(255,107,107,0.3); }

  .edit-form{
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .form-label{
    font-size:11.5px;
    font-weight:700;
    letter-spacing:.05em;
    text-transform:uppercase;
    color:var(--text-2);
    margin:6px 0 -4px;
  }
  .form-input, .form-textarea{
    width:100%;
    padding:12px 14px;
    border-radius:10px;
    border:1px solid var(--border);
    background:var(--bg-2);
    color:var(--text-0);
    font-size:14px;
    font-family:inherit;
    outline:none;
    transition:border-color .25s var(--ease), box-shadow .25s var(--ease);
    resize:vertical;
  }
  .form-input:focus, .form-textarea:focus{
    border-color:var(--accent);
    box-shadow:0 0 0 4px var(--accent-soft);
  }
  .form-textarea{ line-height:1.6; }
  .form-check{
    display:flex; align-items:center; gap:8px;
    font-size:13px; color:var(--text-1);
    cursor:pointer;
  }
  .form-error{ color:#ff8787; font-size:12.5px; margin:0; min-height:16px; }
  .form-actions{ display:flex; justify-content:flex-end; gap:10px; margin-top:6px; }

  /* ---------- DETAIL PANEL (slide-over) ---------- */
  .scrim{
    position:fixed; inset:0;
    background:rgba(4,6,9,0.6);
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
    opacity:0;
    pointer-events:none;
    transition:opacity .35s var(--ease);
    z-index:40;
  }
  .scrim.open{ opacity:1; pointer-events:auto; }

  .detail-panel{
    position:fixed;
    top:0; right:0; bottom:0;
    width:min(560px, 100%);
    background:linear-gradient(175deg, var(--bg-1), var(--bg-0));
    border-left:1px solid var(--border);
    z-index:41;
    transform:translateX(100%);
    transition:transform .45s var(--ease);
    display:flex;
    flex-direction:column;
    box-shadow:-30px 0 60px -20px rgba(0,0,0,.5);
  }
  .detail-panel.open{ transform:translateX(0); }

  .detail-head{
    padding:26px 28px 20px;
    border-bottom:1px solid var(--border);
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:16px;
    flex-shrink:0;
  }
  .detail-head .zone-pill{
    display:inline-flex; align-items:center; gap:6px;
    font-size:11px; font-weight:700; letter-spacing:.05em; text-transform:uppercase;
    color:var(--zone-color, var(--accent));
    background:var(--zone-bg, var(--accent-soft));
    padding:5px 11px; border-radius:999px;
    margin-bottom:12px;
  }
  .detail-head h2{
    margin:0;
    font-size:24px;
    font-weight:800;
    letter-spacing:-0.01em;
  }
  .close-btn{
    width:38px;height:38px;
    border-radius:50%;
    border:1px solid var(--border);
    background:var(--bg-2);
    color:var(--text-1);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    flex-shrink:0;
    transition:background .25s var(--ease), color .25s var(--ease), transform .25s var(--ease), border-color .25s var(--ease);
  }
  .close-btn:hover{
    background:rgba(255,90,90,0.12);
    color:#ff6b6b;
    border-color:rgba(255,90,90,0.3);
    transform:rotate(90deg);
  }
  .close-btn svg{width:16px;height:16px;}

  .detail-body{
    padding:26px 28px 40px;
    overflow-y:auto;
    flex:1;
  }
  .detail-body .label{
    font-size:11.5px;
    font-weight:700;
    letter-spacing:.06em;
    text-transform:uppercase;
    color:var(--text-2);
    margin:0 0 14px;
    display:flex; align-items:center; gap:8px;
  }
  .detail-body .label svg{width:14px;height:14px;}

  .instructions{
    font-size:15.5px;
    line-height:1.85;
    color:#dbe2e9;
    white-space:pre-wrap;
    word-wrap:break-word;
  }
  .instructions .line{
    padding:14px 16px;
    margin-bottom:10px;
    background:var(--bg-2);
    border:1px solid var(--border);
    border-left:3px solid var(--accent);
    border-radius:10px;
    opacity:0;
    transform:translateX(10px);
    animation:lineIn .4s var(--ease) forwards;
  }
  @keyframes lineIn{ to{ opacity:1; transform:translateX(0);} }

  .instructions .line.tool-line{
    border-left-color:var(--blue);
  }
  .instructions .line b{ color:var(--accent-2); font-weight:700; }

  /* scrollbar */

<script>
let LIVE_DATA = null;
let currentUser = null;

function currentData(){ return LIVE_DATA || {}; }

const ZONES = [
  {
    key: "PP2",
    title: "PP2",
    desc: "Planta de proceso 2 — filtros, bombas e intercambiadores",
    color: "#ff8a3d",
    bg: "rgba(255,138,61,0.14)",
    icon: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 21h20"/><rect x="5" y="12" width="3" height="9"/><rect x="10" y="7" width="3" height="14"/><path d="M8 16h2"/><path d="M13 10h2"/><path d="M16 21V9"/><path d="M16 9c-1.1-.9-1.1-2.3 0-3.4 1.1 1.1 1.1 2.5 0 3.4z" fill="currentColor" stroke="none"/><rect x="18.5" y="15" width="3.5" height="6" rx="1"/><path d="M18.5 17.5h-2.5"/></svg>`
  },
  {
    key: "PP3",
    title: "PP3",
    desc: "Planta de proceso 3 — compresores y equipos rotativos",
    color: "#4dabf7",
    bg: "rgba(77,171,247,0.14)",
    icon: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 21h20"/><rect x="5" y="12" width="3" height="9"/><rect x="10" y="7" width="3" height="14"/><path d="M8 16h2"/><path d="M13 10h2"/><path d="M16 21V9"/><path d="M16 9c-1.1-.9-1.1-2.3 0-3.4 1.1 1.1 1.1 2.5 0 3.4z" fill="currentColor" stroke="none"/><rect x="18.5" y="15" width="3.5" height="6" rx="1"/><path d="M18.5 17.5h-2.5"/></svg>`
  },
  {
    key: "PBD",
    title: "PBD",
    desc: "Taller PBD — cables, transmisores e instrumentación",
    color: "#b197fc",
    bg: "rgba(177,151,252,0.14)",
    icon: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 21h20"/><rect x="5" y="12" width="3" height="9"/><rect x="10" y="7" width="3" height="14"/><path d="M8 16h2"/><path d="M13 10h2"/><path d="M16 21V9"/><path d="M16 9c-1.1-.9-1.1-2.3 0-3.4 1.1 1.1 1.1 2.5 0 3.4z" fill="currentColor" stroke="none"/><rect x="18.5" y="15" width="3.5" height="6" rx="1"/><path d="M18.5 17.5h-2.5"/></svg>`
  }
];

const viewport = document.getElementById('viewport');
const breadcrumbEl = document.getElementById('breadcrumb');
const footerEl = document.querySelector('.app-footer');

let state = { zone: null, search: "" };

function zoneMeta(key){ return ZONES.find(z => z.key === key); }

function iconChevronRight(){
  return `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>`;
}
function iconSearch(){
  return `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>`;
}
function iconArrowUpRight(){
  return `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7M8 7h9v9"/></svg>`;
}
function iconLeft(){
  return `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg>`;
}
function iconBox(){
  return `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8l-9-5-9 5 9 5 9-5zM3 8v8l9 5 9-5V8M12 13v8"/></svg>`;
}
function iconPencil(){
  return `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>`;
}
function iconPlus(){
  return `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>`;
}
function escapeHtml(str){
  return String(str == null ? '' : str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderBreadcrumb(){
  let html = `<span class="crumb clickable" data-nav="home">Zonas</span>`;
  if(state.zone){
    const z = zoneMeta(state.zone);
    html += `<span class="sep">/</span><span class="crumb current">${z.title}</span>`;
  }
  breadcrumbEl.innerHTML = html;
  breadcrumbEl.querySelectorAll('[data-nav="home"]').forEach(el => el.addEventListener('click', goHome));
}

function transitionTo(renderFn){
  const current = viewport.firstElementChild;
  if(current){
    current.classList.add('view-exit');
    setTimeout(() => {
      viewport.innerHTML = '';
      const el = renderFn();
      el.classList.add('view-enter');
      viewport.appendChild(el);
    }, 260);
  } else {
    const el = renderFn();
    el.classList.add('view-enter');
    viewport.appendChild(el);
  }
}

function goHome(){
  state.zone = null;
  state.search = "";
  renderBreadcrumb();
  footerEl.textContent = "Selecciona una zona para ver sus equipos";
  transitionTo(renderZones);
}

function openZone(key){
  state.zone = key;
  state.search = "";
  renderBreadcrumb();
  const z = zoneMeta(key);
  footerEl.textContent = z.desc;
  transitionTo(() => renderEquipList(key));
}

function renderZones(){
  const wrap = document.createElement('div');
  wrap.className = 'view';
  const grid = document.createElement('div');
  grid.className = 'zone-grid';

  ZONES.forEach(z => {
    const count = (currentData()[z.key] || []).length;
    const card = document.createElement('div');
    card.className = 'zone-card';
    card.style.setProperty('--zone-color', z.color);
    card.style.setProperty('--zone-bg', z.bg);
    card.style.setProperty('--zone-glow', z.bg);
    card.innerHTML = `
      <div class="zone-icon">${z.icon}</div>
      <h2>${z.title}</h2>
      <p>${z.desc}</p>
      <div class="zone-count"><span class="dot"></span>${count} ${count === 1 ? 'equipo' : 'equipos'}</div>
      <div class="zone-arrow">${iconChevronRight()}</div>
    `;
    card.addEventListener('click', () => openZone(z.key));
    grid.appendChild(card);
  });

  wrap.appendChild(grid);
  return wrap;
}

function renderEquipList(key){
  const z = zoneMeta(key);
  const items = currentData()[key] || [];

  const wrap = document.createElement('div');
  wrap.className = 'view';

  const back = document.createElement('button');
  back.className = 'back-btn';
  back.innerHTML = `${iconLeft()} Volver a zonas`;
  back.addEventListener('click', goHome);
  wrap.appendChild(back);

  const searchWrap = document.createElement('div');
  searchWrap.className = 'search-wrap';
  searchWrap.innerHTML = `${iconSearch()}<input type="text" placeholder="Buscar equipo, por ejemplo E-663..." id="searchInput">`;
  wrap.appendChild(searchWrap);

  const header = document.createElement('div');
  header.className = 'list-header';
  header.innerHTML = `
    <div>
      <h2>${z.title} <span class="badge" id="countBadge">${items.length}</span></h2>
      <span class="sub">${z.desc}</span>
    </div>
  `;
  if(currentUser){
    const addBtn = document.createElement('button');
    addBtn.className = 'btn-primary add-btn';
    addBtn.innerHTML = `${iconPlus()} Añadir equipo`;
    addBtn.addEventListener('click', () => openAddForm(key));
    header.appendChild(addBtn);
  }
  wrap.appendChild(header);

  const gridHolder = document.createElement('div');
  wrap.appendChild(gridHolder);

  function renderGrid(filter){
    const filtered = items.filter(it => it.name.toLowerCase().includes(filter.toLowerCase()));
    document.getElementById('countBadge') && (document.getElementById('countBadge').textContent = filtered.length);

    if(items.length === 0){
      gridHolder.innerHTML = '';
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.innerHTML = `
        ${iconBox()}
        <h3>Todavía no hay equipos cargados</h3>
        <p>Esta zona (${z.title}) está lista para recibir instrucciones de trabajo. ${currentUser ? 'Usa el botón "Añadir equipo" para empezar.' : 'Añade archivos de equipo para verlos aquí.'}</p>`;
      gridHolder.appendChild(empty);
      return;
    }

    if(filtered.length === 0){
      gridHolder.innerHTML = `<div class="empty-state">${iconBox()}<h3>Sin resultados</h3><p>No se encontró ningún equipo que coincida con "${filter}".</p></div>`;
      return;
    }

    const grid = document.createElement('div');
    grid.className = 'equip-grid';
    filtered.forEach((it, i) => {
      const card = document.createElement('div');
      card.className = 'equip-card' + (it.general ? ' general' : '');
      card.style.animationDelay = (i * 0.03) + 's';
      const preview = it.instructions.split('\n').find(l => l.trim().length > 0) || '';
      card.innerHTML = `
        <span class="tag">${it.general ? 'Nota general' : 'Equipo'}</span>
        <h3>${escapeHtml(it.name)}</h3>
        <p class="preview">${escapeHtml(preview)}</p>
        <div class="go">Ver instrucciones ${iconArrowUpRight()}</div>
        ${currentUser ? `<button class="card-pencil" title="Editar">${iconPencil()}</button>` : ''}
      `;
      card.addEventListener('click', () => openDetail(key, it));
      const pencil = card.querySelector('.card-pencil');
      if(pencil){
        pencil.addEventListener('click', (e) => {
          e.stopPropagation();
          openEditForm(key, it);
        });
      }
      grid.appendChild(card);
    });
    gridHolder.innerHTML = '';
    gridHolder.appendChild(grid);
  }

  renderGrid('');
  searchWrap.querySelector('#searchInput').addEventListener('input', (e) => {
    renderGrid(e.target.value);
  });

  return wrap;
}

/* ---------- DETAIL PANEL ---------- */
const scrim = document.getElementById('scrim');
const panel = document.getElementById('detailPanel');
const closeBtn = document.getElementById('closeBtn');
const editBtn = document.getElementById('editBtn');
const deleteBtn = document.getElementById('deleteBtn');
const detailTitle = document.getElementById('detailTitle');
const detailZonePill = document.getElementById('detailZonePill');
const detailInstructions = document.getElementById('detailInstructions');
const editForm = document.getElementById('editForm');
const formName = document.getElementById('formName');
const formGeneral = document.getElementById('formGeneral');
const formInstructions = document.getElementById('formInstructions');
const formError = document.getElementById('formError');
const formCancel = document.getElementById('formCancel');
const formSave = document.getElementById('formSave');

let panelContext = { zoneKey: null, item: null, mode: 'view' }; // mode: 'view' | 'edit' | 'create'

function openDetail(zoneKey, item){
  panelContext = { zoneKey, item, mode: 'view' };
  const z = zoneMeta(zoneKey);
  detailZonePill.textContent = z.title;
  detailZonePill.style.setProperty('--zone-color', z.color);
  detailZonePill.style.setProperty('--zone-bg', z.bg);
  detailTitle.textContent = item.name;
  document.getElementById('detailLabelText').textContent = 'Instrucciones para realizar el trabajo';

  const toolWords = /(llave|grifa|explosimetro|traje|andamio|grua|tapon|tapones)/i;
  const lines = item.instructions.split('\n').filter(l => l.trim().length > 0);
  detailInstructions.innerHTML = lines.map((line, i) => {
    const isTool = toolWords.test(line);
    const safe = escapeHtml(line);
    return `<div class="line${isTool ? ' tool-line' : ''}" style="animation-delay:${i * 0.045}s">${safe}</div>`;
  }).join('');
  detailInstructions.hidden = false;
  editForm.hidden = true;

  editBtn.hidden = !currentUser;
  deleteBtn.hidden = !currentUser;

  scrim.classList.add('open');
  panel.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function openEditForm(zoneKey, item){
  panelContext = { zoneKey, item, mode: 'edit' };
  const z = zoneMeta(zoneKey);
  detailZonePill.textContent = z.title;
  detailZonePill.style.setProperty('--zone-color', z.color);
  detailZonePill.style.setProperty('--zone-bg', z.bg);
  detailTitle.textContent = 'Editar equipo';
  document.getElementById('detailLabelText').textContent = 'Editando instrucciones';

  formName.value = item.name;
  formGeneral.checked = !!item.general;
  formInstructions.value = item.instructions;
  formError.textContent = '';

  detailInstructions.hidden = true;
  editForm.hidden = false;
  editBtn.hidden = true;
  deleteBtn.hidden = true;

  scrim.classList.add('open');
  panel.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function openAddForm(zoneKey){
  panelContext = { zoneKey, item: null, mode: 'create' };
  const z = zoneMeta(zoneKey);
  detailZonePill.textContent = z.title;
  detailZonePill.style.setProperty('--zone-color', z.color);
  detailZonePill.style.setProperty('--zone-bg', z.bg);
  detailTitle.textContent = 'Nuevo equipo';
  document.getElementById('detailLabelText').textContent = 'Añadir instrucciones';

  formName.value = '';
  formGeneral.checked = false;
  formInstructions.value = '';
  formError.textContent = '';

  detailInstructions.hidden = true;
  editForm.hidden = false;
  editBtn.hidden = true;
  deleteBtn.hidden = true;

  scrim.classList.add('open');
  panel.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDetail(){
  scrim.classList.remove('open');
  panel.classList.remove('open');
  document.body.style.overflow = '';
}

editBtn.addEventListener('click', () => openEditForm(panelContext.zoneKey, panelContext.item));
formCancel.addEventListener('click', () => {
  if(panelContext.mode === 'edit'){
    openDetail(panelContext.zoneKey, panelContext.item);
  } else {
    closeDetail();
  }
});

deleteBtn.addEventListener('click', async () => {
  if(!panelContext.item) return;
  const ok = confirm(`¿Seguro que quieres eliminar "${panelContext.item.name}"? Esta acción no se puede deshacer.`);
  if(!ok) return;
  try{
    const { db, doc, deleteDoc } = window.fbApi;
    await deleteDoc(doc(db, 'equipos', panelContext.item.id));
    closeDetail();
  }catch(err){
    alert('No se pudo eliminar: ' + err.message);
  }
});

formSave.addEventListener('click', async () => {
  const name = formName.value.trim();
  const instructions = formInstructions.value.trim();
  if(!name){ formError.textContent = 'Ponle un nombre al equipo.'; return; }
  if(!instructions){ formError.textContent = 'Escribe las instrucciones.'; return; }
  formSave.disabled = true;
  formSave.textContent = 'Guardando...';
  try{
    const { db, doc, setDoc, addDoc, collection } = window.fbApi;
    const payload = {
      zone: panelContext.zoneKey,
      name,
      general: formGeneral.checked,
      instructions,
      updatedAt: Date.now()
    };
    if(panelContext.mode === 'edit' && panelContext.item){
      await setDoc(doc(db, 'equipos', panelContext.item.id), payload, { merge: true });
    } else {
      await addDoc(collection(db, 'equipos'), payload);
    }
    closeDetail();
  }catch(err){
    formError.textContent = 'No se pudo guardar: ' + err.message;
  }finally{
    formSave.disabled = false;
    formSave.textContent = 'Guardar';
  }
});

scrim.addEventListener('click', closeDetail);
closeBtn.addEventListener('click', closeDetail);
document.addEventListener('keydown', (e) => { if(e.key === 'Escape') closeDetail(); });

/* ---------- AUTH ---------- */
const authBtn = document.getElementById('authBtn');
const authPop = document.getElementById('authPop');
const authEmail = document.getElementById('authEmail');
const authPass = document.getElementById('authPass');
const authSubmit = document.getElementById('authSubmit');
const authError = document.getElementById('authError');

authBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  if(currentUser){
    window.fbApi.signOut(window.fbApi.auth);
    return;
  }
  authPop.classList.toggle('open');
});

document.addEventListener('click', (e) => {
  if(!authPop.classList.contains('open')) return;
  if(authPop.contains(e.target) || e.target === authBtn) return;
  authPop.classList.remove('open');
});

authPass.addEventListener('keydown', (e) => {
  if(e.key === 'Enter') authSubmit.click();
});

authSubmit.addEventListener('click', async () => {
  authError.textContent = '';
  authSubmit.disabled = true;
  authSubmit.textContent = 'Entrando...';
  try{
    await window.fbApi.signInWithEmailAndPassword(window.fbApi.auth, authEmail.value.trim(), authPass.value);
    authPop.classList.remove('open');
    authEmail.value = '';
    authPass.value = '';
  }catch(err){
    authError.textContent = 'No se pudo iniciar sesión. Revisa el email y la contraseña.';
  }finally{
    authSubmit.disabled = false;
    authSubmit.textContent = 'Entrar';
  }

function updateAuthUI(){
  if(currentUser){
    const email = (currentUser.email || '').toLowerCase();
    const avatar = AVATARS[email];
    authBtn.innerHTML = (avatar ? `<img class="auth-avatar" src="${avatar}" alt="">` : '') + `Cerrar sesión (${currentUser.email})`;
    authPop.classList.remove('open');
  } else {
    authBtn.textContent = 'Iniciar sesión';
  }
}

    <div class="login-gate">
      <div class="login-gate-icon">${iconLock()}</div>
      <h2>Acceso restringido</h2>
      <p>Inicia sesión con tu cuenta para ver los equipos y sus instrucciones de trabajo.</p>
    </div>
  `;
  return wrap;
}

function renderLoadingState(){
  const wrap = document.createElement('div');
  wrap.className = 'view';
  wrap.innerHTML = `<div class="login-gate"><p>Comprobando sesión…</p></div>`;
  return wrap;
}

let authChecked = false;
let unsubscribeEquipos = null;

function rerenderCurrentView(){
  viewport.innerHTML = '';
  if(!authChecked){
    viewport.appendChild(renderLoadingState());
    return;
  }
  if(!currentUser){
    viewport.appendChild(renderLoginGate());
    return;
  }
  if(!state.zone){
    viewport.appendChild(renderZones());
  } else {
    viewport.appendChild(renderEquipList(state.zone));
  }
}

function initFirebaseWiring(){
  const { auth, onAuthStateChanged, db, collection, onSnapshot } = window.fbApi;

  onAuthStateChanged(auth, (user) => {
    currentUser = user;
    authChecked = true;
    updateAuthUI();

    if(unsubscribeEquipos){ unsubscribeEquipos(); unsubscribeEquipos = null; }

    if(user){
      unsubscribeEquipos = onSnapshot(collection(db, 'equipos'), (snap) => {
        const grouped = {};
        snap.forEach(docSnap => {
          const d = docSnap.data();
          if(!grouped[d.zone]) grouped[d.zone] = [];
          grouped[d.zone].push({
            id: docSnap.id,
            name: d.name,
            general: !!d.general,
            instructions: d.instructions || ''
          });
        });
        Object.keys(grouped).forEach(z => grouped[z].sort((a,b) => (b.general - a.general) || a.name.localeCompare(b.name)));
        LIVE_DATA = grouped;
        rerenderCurrentView();
      }, (err) => {
        console.error('Firestore sync error:', err);
      });
    } else {
      LIVE_DATA = null;
      state.zone = null;
      renderBreadcrumb();
      closeDetail();
    }

    rerenderCurrentView();
  });
}

if(window.fbApi){
  initFirebaseWiring();
} else {
  window.addEventListener('fb-ready', initFirebaseWiring, { once: true });
}

/* ---------- INIT ---------- */
renderBreadcrumb();
viewport.appendChild(renderLoadingState());
</script>

</body>
</html>
